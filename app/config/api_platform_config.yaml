api:
  title: HireMe Hiring API
  version: 0.1.0
  description: Async backend for job openings and candidate applications.

error:
  request_validation_message: Request validation failed.
  http_error_message: HTTP error occurred.
  internal_error_message: An unexpected error occurred.
  status_code_map:
    400: bad_request
    401: unauthorized
    403: forbidden
    404: not_found
    409: conflict
    422: unprocessable_entity
    429: rate_limited
    504: request_timeout

security:
  enabled: true
  jwt_algorithm: HS256
  required_role: admin
  issuer: hireme-backend
  audience: hireme-admin
  access_token_exp_minutes: 120
  leeway_seconds: 30

cors:
  enabled: true
  allow_origins:
    - http://localhost:3000
    - http://hireme-ui.s3-website-us-east-1.amazonaws.com
    - https://d3lsp5lbmwo1k3.cloudfront.net
    - http://d3lsp5lbmwo1k3.cloudfront.net
  allow_methods:
    - GET
    - POST
    - PATCH
    - DELETE
  allow_headers:
    - Authorization
    - Content-Type
    - Accept
  allow_credentials: false
  expose_headers: []
  max_age_seconds: 600

security_headers:
  enabled: true
  x_content_type_options: nosniff
  x_frame_options: DENY
  referrer_policy: strict-origin-when-cross-origin
  content_security_policy: "default-src 'none'; frame-ancestors 'none'; base-uri 'self';"
  include_hsts: false
  hsts_max_age_seconds: 31536000
  hsts_include_subdomains: true
  hsts_preload: false
  csp_exempt_paths:
    - /docs
    - /openapi.json
    - /redoc
    - /docs/oauth2-redirect

timeout:
  enabled: true
  seconds: 30
  message: request timed out
  exempt_paths:
    - /health
    - /api/v1/applications/interview/confirm-token
    - /api/v1/applications/interview/action-token

rate_limit:
  enabled: true
  window_seconds: 60
  max_requests: 60
  key_by_path: true
  trust_x_forwarded_for: false
  max_tracked_clients: 100000
  cleanup_interval_seconds: 30
  message: rate limit exceeded
  exempt_paths:
    - /health
    - /docs
    - /openapi.json
    - /redoc
    - /docs/oauth2-redirect
