notification:
  enabled: true
  provider: smtp
  sender_name: HireMe Team
  sender_email: doersbinit@gmail.com
  smtp:
    host: smtp.gmail.com
    port: 587
    use_starttls: true
    use_ssl: false
  confirmation_subject_template: "Application submitted - HireMe"
  confirmation_body_template: |
    Hi {candidate_name},

    Thank you for applying to HireMe. Your application has been submitted.

    Regards,
    HireMe Team
  rejection_subject_template: "Application update - HireMe"
  rejection_body_template: |
    Hi {candidate_name},

    Thank you for applying to HireMe for the {role_title} role.
    After review, we will not be moving ahead with your resume this time.

    Regards,
    HireMe Team
  interview_options_subject_template: "Congratulations - Technical Interview Scheduling ({role_title})"
  interview_options_body_template: |
    Hi {candidate_name},

    Congratulations! You have cleared the screening for the {role_title} role and moved to the technical interview round.
    Please review the available interview slots below and click your preferred option:

    {slot_options}

    These slots are held temporarily and will be released at {hold_expires_at} if not confirmed.
    Once you confirm one slot, we will finalize your technical interview booking.

    Regards,
    HireMe Team
  interview_reminder_subject_template: "Reminder: confirm interview slot in 24 hours - HireMe ({role_title})"
  interview_reminder_body_template: |
    Hi {candidate_name},

    This is a reminder to confirm your technical interview slot for the {role_title} role.
    Please review the held interview slots below and click your preferred option:

    {slot_options}

    If you are interested, please confirm within the next 24 hours. Unconfirmed slots will expire at {hold_expires_at}.

    Regards,
    HireMe Team
  interview_confirmed_subject_template: "Interview confirmed - HireMe ({role_title})"
  interview_confirmed_body_template: |
    Hi {candidate_name},

    Your technical interview has been confirmed for:
    {confirmed_slot}

    {action_links}

    A calendar invitation has been sent.

    Regards,
    HireMe Team
  interview_reschedule_options_subject_template: "Action required: approve alternative interview slots - HireMe ({role_title})"
  interview_reschedule_options_body_template: |
    Hi Hiring Manager,

    {candidate_name} requested to reschedule the technical interview for {role_title}.
    Please review the proposed options below and click one ACCEPT link:

    {slot_options}

    If none work, click REJECT to request the next set of options:
    {reject_link}

    Regards,
    HireMe Team
  send_timeout_seconds: 5
  fail_submission_on_send_error: false
