notification:
  enabled: true
  provider: smtp
  sender_name: HireMe Team
  sender_email: doersbinit@gmail.com
  smtp:
    host: smtp.gmail.com
    port: 587
    use_starttls: true
    use_ssl: false
  confirmation_subject_template: "Application submitted - HireMe"
  confirmation_body_template: |
    Hi {candidate_name},

    Thank you for applying to HireMe. Your application has been submitted.

    Regards,
    HireMe Team
  rejection_subject_template: "Application update - HireMe"
  rejection_body_template: |
    Hi {candidate_name},

    Thank you for applying to HireMe for the {role_title} role.
    After review, we will not be moving ahead with your resume this time.

    Regards,
    HireMe Team
  interview_options_subject_template: "Congratulations - Technical Interview Scheduling ({role_title})"
  interview_options_body_template: |
    Hi {candidate_name},

    Congratulations! You have cleared the screening for the {role_title} role and moved to the technical interview round.
    Please review the available interview slots below and reply with your preferred option:

    {slot_options}

    These slots are held temporarily and will be released at {hold_expires_at} if not confirmed.
    Once you confirm one slot, we will finalize your technical interview booking.

    Regards,
    HireMe Team
  send_timeout_seconds: 5
  fail_submission_on_send_error: false
