scheduling:
  enabled: true
  use_queue: true
  provider: sqs
  region: us-east-1
  queue_name: hireme-interview-scheduling
  queue_url: "https://sqs.us-east-1.amazonaws.com/173763384281/hireme-interview-scheduling"
  enqueue_timeout_seconds: 2.0
  worker_concurrency: 4
  max_in_flight_per_worker: 4
  receive_batch_size: 10
  receive_wait_seconds: 20
  visibility_timeout_seconds: 300
  max_receive_count: 5
  auto_enqueue_after_shortlist: true
  target_statuses:
    - shortlisted
  min_slots: 3
  max_slots: 5
  slot_duration_minutes: 45
  slot_step_minutes: 30
  business_days_ahead: 5
  business_hours_start_hour: 10
  business_hours_end_hour: 17
  min_notice_hours: 4
  hold_expiry_hours: 48
  reminder_enabled: true
  reminder_after_hours: 24
  reminder_target_statuses:
    - interview_options_sent
    - interview_email_sent
    - options_sent
  reminder_batch_size: 100
  timezone: Asia/Kathmandu
  use_domain_wide_delegation: false
  candidate_confirmation_page_url: "http://localhost:3000/interview/confirm"
  interview_action_page_url: "http://localhost:3000/interview/action"
  manager_reschedule_action_page_url: "http://localhost:3000/interview/action"
  confirmable_statuses:
    - interview_options_sent
    - interview_email_sent
    - options_sent
  manager_reschedule_confirmable_statuses:
    - interview_reschedule_options_sent
  booked_status: interview_booked
  reschedule_requested_status: interview_reschedule_requested
  reschedule_options_sent_status: interview_reschedule_options_sent
  reschedule_confirming_status: interview_reschedule_confirming
  max_reschedule_rounds: 6
  action_link_expiry_hours: 72
  expired_status: interview_expired
  release_other_holds_on_confirm: true
  require_confirmation_before_expiry: true
  move_candidate_to_in_interview_on_booking: true
  candidate_status_on_booking: in_interview
  calendar_send_updates_mode: all
  auto_release_expired_holds: true
  expiry_poll_interval_seconds: 15
  expiry_batch_size: 100
  expiry_target_statuses:
    - interview_options_sent
    - interview_email_sent
    - options_sent
    - interview_reschedule_options_sent
  fireflies:
    enabled: true
    demo_mode: true
    api_url: "https://api.fireflies.ai/graphql"
    owner_email: "doersbinit@gmail.com"
    request_timeout_seconds: 15.0
    poll_interval_seconds: 60
    batch_size: 50
    join_before_minutes: 10
    join_retry_cooldown_minutes: 5
    transcript_poll_delay_minutes: 0
    transcript_poll_interval_minutes: 1
    max_poll_attempts: 180
    transcript_lookup_hours: 72
    transcripts_page_limit: 20
    max_transcript_pages: 3
    update_schedule_status_on_complete: true
    completed_schedule_status: "interview_done"
