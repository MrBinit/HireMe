api:
  title: HireMe Hiring API
  version: 0.1.0
  description: Async backend for job openings and candidate applications.

error:
  request_validation_message: Request validation failed.
  http_error_message: HTTP error occurred.
  internal_error_message: An unexpected error occurred.
  status_code_map:
    400: bad_request
    401: unauthorized
    403: forbidden
    404: not_found
    409: conflict
    422: unprocessable_entity
    429: rate_limited
    504: request_timeout

security:
  enabled: true
  jwt_algorithm: HS256
  required_role: admin
  issuer: hireme-backend
  audience: hireme-admin
  access_token_exp_minutes: 120
  leeway_seconds: 30

security_headers:
  enabled: true
  x_content_type_options: nosniff
  x_frame_options: DENY
  referrer_policy: strict-origin-when-cross-origin
  content_security_policy: "default-src 'none'; frame-ancestors 'none'; base-uri 'self';"
  include_hsts: false
  hsts_max_age_seconds: 31536000
  hsts_include_subdomains: true
  hsts_preload: false
  csp_exempt_paths:
    - /docs
    - /openapi.json
    - /redoc
    - /docs/oauth2-redirect

timeout:
  enabled: true
  seconds: 30
  message: request timed out
  exempt_paths:
    - /health

rate_limit:
  enabled: true
  window_seconds: 60
  max_requests: 60
  key_by_path: true
  trust_x_forwarded_for: false
  max_tracked_clients: 100000
  cleanup_interval_seconds: 30
  message: rate limit exceeded
  exempt_paths:
    - /health
    - /docs
    - /openapi.json
    - /redoc
    - /docs/oauth2-redirect

job_opening:
  allowed_experience_levels:
    - intern
    - junior
    - mid
    - senior
    - staff
    - principal
  experience_range_pattern: "^\\d+\\s*-\\s*\\d+\\s*years?$"
  min_bullet_items: 1
  max_bullet_items: 25
  default_list_limit: 20
  max_list_limit: 100

application:
  allowed_resume_extensions:
    - .pdf
    - .doc
    - .docx
  allowed_resume_content_types:
    - application/pdf
    - application/msword
    - application/vnd.openxmlformats-officedocument.wordprocessingml.document
    - application/octet-stream
  max_pdf_size_mb: 10
  max_doc_size_mb: 10
  max_docx_size_mb: 10
  resume_chunk_size_bytes: 1048576
  default_list_limit: 20
  max_list_limit: 100
  applications_not_open_message: applications have not opened yet
  application_closed_message: Sorry, the application has already been closed for this role.
  invalid_resume_format_message: Invalid resume format. Please upload a PDF or DOCX file.
  duplicate_application_message: "duplicate application: this email has already applied to this job opening"
