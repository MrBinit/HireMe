evaluation:
  enabled: true
  use_queue: true
  provider: sqs
  region: us-east-1
  queue_name: hireme-llm-evaluation
  queue_url: "https://sqs.us-east-1.amazonaws.com/173763384281/hireme-llm-evaluation"
  enqueue_timeout_seconds: 2
  worker_concurrency: 10
  max_in_flight_per_worker: 10
  receive_batch_size: 10
  receive_wait_seconds: 20
  visibility_timeout_seconds: 300
  max_receive_count: 5
  target_statuses:
    - screened
    - shortlisted
    - in_interview
    - offer
    - sent_to_manager
  max_reason_chars: 500
  max_work_summary_chars: 1500
  offer_letter_generation_enabled: true
  offer_letter_profile_json_max_chars: 4000
  offer_letter_max_chars: 8000
  slack_welcome_generation_enabled: true
  slack_welcome_max_chars: 2000
