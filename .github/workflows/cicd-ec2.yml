name: CI/CD EC2 Prod

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  ECR_REPOSITORY: hireme-backend

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "$ECR_REPOSITORY" >/dev/null

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push linux/amd64 image
        id: image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker buildx build --platform linux/amd64 --push -t "$IMAGE_URI" .
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"
          echo "Pushed $IMAGE_URI"

  deploy_prod:
    runs-on: ubuntu-latest
    needs: build_and_push
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials (OIDC role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Write SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy to EC2
        run: |
          set -euo pipefail

          ssh -o StrictHostKeyChecking=no \
              -p "${{ secrets.EC2_PORT }}" \
              -i ~/.ssh/deploy_key \
              "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
              "IMAGE_URI='${{ needs.build_and_push.outputs.image_uri }}' AWS_REGION='${{ vars.AWS_REGION }}' SECRET_REGION='${{ vars.AWS_SECRETS_MANAGER_REGION }}' SECRET_ID='${{ vars.AWS_SECRETS_MANAGER_SECRET_ID }}' APP_DIR='${{ vars.EC2_APP_DIR }}' API_WORKERS='${{ vars.API_WORKERS }}' WEBHOOK_BASE_URL='${{ vars.PUBLIC_BASE_URL }}' bash -s" <<'EOF'
          set -euo pipefail
          cd "$APP_DIR"

          cat > docker-compose.ecr.yml <<EOC
services:
  api:
    image: ${IMAGE_URI}
    build: null
  sqs_worker:
    image: ${IMAGE_URI}
    build: null
  sqs_evaluation_worker:
    image: ${IMAGE_URI}
    build: null
  sqs_research_enrichment_worker:
    image: ${IMAGE_URI}
    build: null
  sqs_scheduling_worker:
    image: ${IMAGE_URI}
    build: null
  interview_hold_expiry_worker:
    image: ${IMAGE_URI}
    build: null
EOC

          if [ -n "${WEBHOOK_BASE_URL:-}" ]; then
            sed -i "s#^  webhook_url: .*#  webhook_url: ${WEBHOOK_BASE_URL}/api/v1/integrations/docusign/webhook#" app/config/application_config.yaml
          fi

          export AWS_REGION="${SECRET_REGION:-$AWS_REGION}"
          export AWS_DEFAULT_REGION="${SECRET_REGION:-$AWS_REGION}"
          export AWS_SECRETS_MANAGER_SECRET_ID="$SECRET_ID"
          export API_WORKERS="${API_WORKERS:-1}"
          export SECRETS_MANAGER_PREFER_ENV=true

          ECR_REGISTRY="$(echo "$IMAGE_URI" | cut -d/ -f1)"
          aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"

          docker compose -f docker-compose.yml -f docker-compose.ecr.yml up -d --no-build --force-recreate

          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              break
            fi
            sleep 2
          done

          curl -fsS http://127.0.0.1:8000/health
          docker compose -f docker-compose.yml -f docker-compose.ecr.yml ps
          EOF
